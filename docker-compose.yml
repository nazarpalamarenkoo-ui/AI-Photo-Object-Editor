services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    gpus: all
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${SECRET_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - U2NET_HOME=/app/weights/rembg
      - SERVICE_NAME=image-editor-api
    volumes:
      - ./backend:/app
      - ./backend/weights:/app/weights
      - ./backend/weights/lama_cache:/root/.cache/torch/hub/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    gpus: all
    command: arq app.workers.worker.WorkerSettings
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${SECRET_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - U2NET_HOME=/app/weights/rembg
      - ML_DEVICE=cpu
      - SERVICE_NAME=image-editor-worker
    volumes:
      - ./backend:/app
      - ./backend/weights:/app/weights
      - ./backend/weights/lama_cache:/root/.cache/torch/hub/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped
  loki:
    image: grafana/loki:3.1.1
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.4.3
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=15d
    restart: unless-stopped

  gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.3.2
    gpus: all
    ports:
      - "9835:9835"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"  
    restart: unless-stopped
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
    name: backend_postgres_data
  redis_data:
    name: backend_redis_data
  mlflow_data:
    name: backend_mlflow_data
  loki_data:
    name: backend_loki_data
  alloy_data:
    name: backend_alloy_data
  grafana_data:
    name: backend_grafana_data
  prometheus_data:
    name: backend_prometheus_data
  tempo_data:
    name: backend_tempo_data